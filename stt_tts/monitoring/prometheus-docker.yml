global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: "gateway"
    static_configs:
      - targets: ["gateway:8090"]

  - job_name: "stt"
    static_configs:
      - targets: ["stt:8001"]

  - job_name: "cag"
    static_configs:
      - targets: ["cag:8000"]

  - job_name: "auth"
    static_configs:
      - targets: ["auth:8006"]

  - job_name: "sessions"
    static_configs:
      - targets: ["sessions:8005"]

  - job_name: "messages"
    static_configs:
      - targets: ["messages:8003"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
